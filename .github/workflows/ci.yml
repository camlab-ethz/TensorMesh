name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

# Cancel superseded runs on the same ref (e.g. a force-push to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install OpenGL / X11 runtime libs for gmsh
        # libgmsh.so hard-links libGLU / libGL / X11 (ELF NEEDED entries),
        # so on a bare runner any test that builds a mesh fails with
        # "ImportError: libGLU.so.1: cannot open shared object file".
        # This is the CI analogue of `module load mesa-glu` on Euler.
        # These are shared libraries only — headless mesh generation needs
        # no display, so no Xvfb is required.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libglu1-mesa libgl1 libx11-6 libxrender1 libxcursor1 \
            libxft2 libxinerama1 libxfixes3 libfontconfig1

      - name: Install package (CPU-only torch)
        # Install the CPU torch wheel first so the editable install below
        # resolves torch from PyPI's CPU index instead of pulling the
        # multi-GB CUDA build. torch-sla's base install is CPU-compatible;
        # the GPU backends ([cupy] / [cudss]) are not exercised in CI.
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[test]"

      - name: Run test suite
        # CPU + float64 by convention; the CUDA-only tests carry
        # @pytest.mark.skipif(not torch.cuda.is_available()) and report as
        # skipped here rather than failing.
        run: pytest tests/ -v
